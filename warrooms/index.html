<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>warrooms</title>
    <meta name="description" content="warrooms by omniping — right people, right context" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #ece6d8;
        --ink: #1b1714;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Instrument Serif", Georgia, serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-weight: 400;
        font-size: clamp(3rem, 14vw, 10rem);
        line-height: 1;
        letter-spacing: -0.02em;
        margin: 0 0 1rem;
        font-feature-settings: "liga", "dlig";
      }

      p {
        font-style: italic;
        font-size: clamp(1rem, 3vw, 1.5rem);
        opacity: 0.7;
        margin: 0 0 3rem;
      }

      a {
        color: var(--ink);
        font-style: italic;
        font-size: 0.9rem;
        opacity: 0.45;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      a:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>warrooms</h1>
      <p>right people, right context</p>
      <a href="/">by omniping</a>
    </main>
  </body>
</html>
