<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>warrooms &mdash; right people, right context</title>
    <meta name="description" content="warrooms by omniping &mdash; right people, right context" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09090b;
        --text: #ededed;
        --text-muted: #737373;
        --text-faint: #525252;
        --accent: #fbbf24;
        --font-display: 'Space Mono', monospace;
        --font-body: 'Space Grotesk', sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        display: grid;
        place-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }

      main {
        text-align: center;
      }

      h1 {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(2.3rem, 10vw, 4.1875rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }

      p {
        font-family: var(--font-display);
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 2.5rem;
      }

      a {
        font-family: var(--font-display);
        font-size: 0.75rem;
        color: var(--text-faint);
        text-decoration: none;
        letter-spacing: 0.08em;
        transition: color 0.2s;
      }

      a:hover {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>warrooms</h1>
      <p>right people, right context</p>
      <a href="/">&larr; omniping</a>
    </main>
  </body>
</html>
