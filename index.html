<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pong</title>
    <meta name="description" content="omniping llc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #ece6d8;
        --ink: #1b1714;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Instrument Serif", Georgia, serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-weight: 400;
        font-size: clamp(3rem, 14vw, 10rem);
        line-height: 1;
        letter-spacing: -0.02em;
        margin: 0 0 3rem;
        font-feature-settings: "liga", "dlig";
      }

      h1 em {
        font-style: italic;
        font-size: 0.55em;
        letter-spacing: 0.04em;
        vertical-align: 0.35em;
        margin-left: 0.25em;
        opacity: 0.72;
      }

      .products {
        display: flex;
        gap: clamp(2rem, 6vw, 4rem);
        justify-content: center;
        flex-wrap: wrap;
      }

      .product {
        text-decoration: none;
        color: var(--ink);
        text-align: center;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      .product:hover {
        opacity: 1;
      }

      .product-name {
        display: block;
        font-size: clamp(1.25rem, 4vw, 2rem);
        letter-spacing: -0.01em;
      }

      .product-tagline {
        display: block;
        font-style: italic;
        font-size: clamp(0.75rem, 2vw, 0.95rem);
        opacity: 0.7;
        margin-top: 0.25rem;
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
      }

      footer a {
        font-style: italic;
        font-size: 0.8rem;
        color: var(--ink);
        text-decoration: none;
        opacity: 0.3;
        transition: opacity 0.2s;
      }

      footer a:hover {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>omniping<em>llc</em></h1>
      <nav class="products">
        <a class="product" href="/loopback">
          <span class="product-name">loopback</span>
          <span class="product-tagline">ai driven productivity</span>
        </a>
        <a class="product" href="/warrooms">
          <span class="product-name">warrooms</span>
          <span class="product-tagline">right people, right context</span>
        </a>
        <a class="product" href="/theway">
          <span class="product-name">theway</span>
          <span class="product-tagline">for obstacles</span>
        </a>
      </nav>
    </main>
    <footer>
      <a href="/legal">legal</a>
    </footer>
  </body>
</html>
