<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>omniping &mdash; sharp tools for sharp people</title>
    <meta name="description" content="omniping builds sharp tools &mdash; loopback, theway, upublish" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09090b;
        --bg-card: #141414;
        --bg-card-hover: #1a1a1a;
        --border: #262626;
        --border-hover: #3a3a3a;
        --text: #ededed;
        --text-muted: #737373;
        --text-faint: #525252;
        --accent-loopback: #818cf8;
        --accent-theway: #34d399;
        --accent-loopback-dim: #818cf830;
        --accent-theway-dim: #34d39930;
        --accent-upublish: #f472b6;
        --accent-upublish-dim: #f472b630;
        --font-display: 'Space Mono', monospace;
        --font-body: 'Space Grotesk', sans-serif;
        --text-xs: 0.75rem;
        --text-sm: 0.875rem;
        --text-base: 1rem;
        --text-lg: 1.3125rem;
        --text-xl: 1.75rem;
        --text-2xl: 2.3125rem;
        --text-3xl: 3.125rem;
        --text-4xl: 4.1875rem;
        --leading-tight: 1.1;
        --leading-normal: 1.5;
        --tracking-tight: -0.02em;
        --tracking-wide: 0.08em;
        --tracking-mega: 0.2em;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: var(--leading-normal);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: 100%;
        max-width: 960px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4rem;
      }

      .brand {
        text-align: center;
      }

      .brand-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(var(--text-3xl), 8vw, var(--text-4xl));
        line-height: var(--leading-tight);
        letter-spacing: var(--tracking-tight);
      }

      .brand-sub {
        font-family: var(--font-display);
        font-size: var(--text-xs);
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: var(--tracking-mega);
        color: var(--text-muted);
        margin-top: 0.75rem;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        width: 100%;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .product {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem;
        min-height: 220px;
        background: var(--bg-card);
        text-decoration: none;
        color: var(--text);
        transition: background 0.2s;
      }

      .product:hover {
        background: var(--bg-card-hover);
      }

      .product-top {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .product-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: var(--text-xl);
        letter-spacing: var(--tracking-tight);
      }

      .product-tagline {
        font-size: var(--text-sm);
        color: var(--text-muted);
        line-height: 1.4;
      }

      .product-arrow {
        font-family: var(--font-display);
        font-size: var(--text-sm);
        transition: color 0.2s, transform 0.2s;
        display: inline-block;
        align-self: flex-end;
      }

      .product:hover .product-arrow {
        transform: translateX(4px);
      }

      .product--loopback:hover {
        border-color: var(--accent-loopback-dim);
      }
      .product--loopback:hover .product-arrow {
        color: var(--accent-loopback);
      }
      .product--loopback .product-name {
        color: var(--accent-loopback);
      }

      .product--theway:hover .product-arrow {
        color: var(--accent-theway);
      }
      .product--theway .product-name {
        color: var(--accent-theway);
      }

      .product--upublish:hover .product-arrow {
        color: var(--accent-upublish);
      }
      .product--upublish .product-name {
        color: var(--accent-upublish);
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        left: 1.5rem;
      }

      footer a {
        font-family: var(--font-display);
        font-size: var(--text-xs);
        color: var(--text-faint);
        text-decoration: none;
        letter-spacing: var(--tracking-wide);
        transition: color 0.2s;
      }

      footer a:hover {
        color: var(--text-muted);
      }

      @media (max-width: 640px) {
        body {
          padding: 1.5rem;
          justify-content: flex-start;
          padding-top: 4rem;
        }

        main {
          gap: 3rem;
        }

        .products {
          grid-template-columns: 1fr;
          border-radius: 10px;
        }

        .product {
          min-height: 160px;
          padding: 1.5rem;
        }

        footer {
          position: static;
          margin-top: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <h1 class="brand-name">omniping</h1>
        <p class="brand-sub">sharp tools for sharp people</p>
      </div>

      <nav class="products">
        <a class="product product--loopback" href="/loopback">
          <div class="product-top">
            <span class="product-name">loopback</span>
            <span class="product-tagline">ai driven productivity &mdash; no account required</span>
          </div>
          <span class="product-arrow">&rarr;</span>
        </a>
        <a class="product product--theway" href="/theway">
          <div class="product-top">
            <span class="product-name">theway</span>
            <span class="product-tagline">wisdom on your lock screen</span>
          </div>
          <span class="product-arrow">&rarr;</span>
        </a>
        <a class="product product--upublish" href="/upublish">
          <div class="product-top">
            <span class="product-name">upublish</span>
            <span class="product-tagline">publish with claude</span>
          </div>
          <span class="product-arrow">&rarr;</span>
        </a>
      </nav>
    </main>

    <footer>
      <a href="/legal">legal</a>
    </footer>
  </body>
</html>
